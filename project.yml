name: WhatIf
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  developmentLanguage: en

settings:
  base:
    DEVELOPMENT_TEAM: "9L6N2ZF26B"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  WhatIf:
    type: application
    platform: iOS
    sources:
      - path: WhatIf/Sources
        type: group
      - path: WhatIf/Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: WhatIf/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.WhatIf
        CODE_SIGN_ENTITLEMENTS: WhatIf/Resources/WhatIf.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    entitlements:
      path: WhatIf/Resources/WhatIf.entitlements
    dependencies: []

  WhatIfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WhatIfTests
        type: group
    settings:
      base:
        INFOPLIST_FILE: WhatIfTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.WhatIfTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WhatIf.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/WhatIf"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: WhatIf

  WhatIfUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WhatIfUITests
        type: group
    settings:
      base:
        INFOPLIST_FILE: WhatIfUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.WhatIfUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WhatIf
    dependencies:
      - target: WhatIf

schemes:
  WhatIf:
    build:
      targets:
        WhatIf: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WhatIfTests
        - WhatIfUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release